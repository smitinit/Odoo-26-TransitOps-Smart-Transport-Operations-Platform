[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# We will override this in env.py from the application settings, 
# but alembic requires a placeholder here
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/transitops

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
